sonar.projectKey=jeffreywevans_Commuted
sonar.organization=jeffreywevans

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=Commuted
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\\" by "/" on Windows.
sonar.sources=commuted_calligraphy
sonar.tests=tests

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Exclude generated artifacts and local virtual environments.
sonar.exclusions=output/**,.venv/**,venv/**

# Test report paths generated in .github/workflows/build.yml.
sonar.python.version=3.10
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
