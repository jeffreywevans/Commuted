# Core project identity is supplied via GitHub Actions variables:
# - SONAR_ORGANIZATION
# - SONAR_PROJECT_KEY

# Keep analysis focused on source and tests in this repository layout.
sonar.sources=tools
sonar.tests=tests

# Exclude generated artifacts and virtual environments from analysis.
sonar.exclusions=output/**,.venv/**,venv/**

# Report import paths generated in .github/workflows/sonar.yml.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
