[tox]
envlist = py312
skipsdist = True

[testenv]
deps =
    -r requirements-dev.txt
    pytest-cov
setenv =
    COVERAGE_PROCESS_START = {toxinidir}/tox.ini
    COVERAGE_FILE = {toxworkdir}/.coverage
commands =
    pytest --cov=commuted_calligraphy --cov-config=tox.ini --cov-branch --cov-report= --junitxml=test-results.xml
    python -c "import glob, os, subprocess, sys; covfile=os.environ.get('COVERAGE_FILE', '.coverage'); pattern=covfile + '.*'; combine_dir=os.path.dirname(covfile) or '.'; sys.exit(subprocess.call([sys.executable, '-m', 'coverage', 'combine', combine_dir]) if glob.glob(pattern) else 0)"
    python -m coverage xml -o coverage.xml
    python -m coverage report -m

[coverage:run]
relative_files = True
parallel = True
patch = subprocess

[coverage:report]
show_missing = True
skip_covered = False
