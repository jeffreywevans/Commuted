[tox]
envlist = py312
skipsdist = True

[testenv]
deps =
    -r requirements-dev.txt
    pytest-cov
setenv =
    COVERAGE_PROCESS_START = {toxinidir}/tox.ini
commands =
    pytest --cov=commuted_calligraphy --cov-config=tox.ini --cov-branch --cov-report= --junitxml=test-results.xml
    python -c "from pathlib import Path; import subprocess, sys; files=list(Path('.').glob('.coverage.*')); sys.exit(subprocess.call(['coverage', 'combine']) if files else 0)"
    coverage xml -o coverage.xml
    coverage report -m

[coverage:run]
relative_files = True
parallel = True
patch = subprocess

[coverage:report]
show_missing = True
skip_covered = False
