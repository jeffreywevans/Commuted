[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "commuted-story-brief"
version = "2026.04.10"
description = "Generate random story briefs for the Commuted archive"
authors = [{name = "Kendall Weatherby"}]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["PyYAML>=6.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
story-brief = "tools.generate_story_brief:main"

[tool.setuptools.packages.find]
include = ["tools*", "data*"]

[tool.setuptools.package-data]
"data.story_brief" = ["*.json"]
